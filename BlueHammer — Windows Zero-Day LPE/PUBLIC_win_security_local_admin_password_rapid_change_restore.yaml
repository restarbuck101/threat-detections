# Detection Rule — BlueHammer Zero-Day Response
# Public release — sanitized for community sharing
#
# ── IDENTITY ─────────────────────────────────────────────────────────────────
id: "win_security_local_admin_password_rapid_change_restore"
title: "Local Administrator Password Rapid Change and Restore"
description: |
  Detects two or more password change events (Event IDs 4723/4724) on the same
  local administrator account within a 120-second window. This is the cleanup
  signature of the BlueHammer LPE exploit chain: the exploit forcibly resets a
  local admin password via SamiChangePasswordUser to authenticate and escalate,
  then immediately restores the original NTLM hash to avoid detection.

  This pattern has no legitimate operational explanation and is the highest
  behavioral uniqueness indicator in the BlueHammer kill chain.

  ENVIRONMENT NOTE: This query uses toupper(tostring(split(Computer, ".")[0]))
  to extract the NetBIOS hostname from Computer for TargetDomainName matching.
  This handles environments where Computer is stored as an FQDN (HOST.domain.com)
  while TargetDomainName is stored as NetBIOS (HOST). Validate this matches
  your environment before deploying.

# ── AUTHORSHIP ───────────────────────────────────────────────────────────────
author: "Detection Engineering"
created_date:  "2026-04-08"
modified_date: "2026-04-08"

# ── CLASSIFICATION ───────────────────────────────────────────────────────────
severity:  "Critical"
platform:  "Sentinel"
workspace: "all"
status:    "Testing"
tier0:     false

# ── MITRE ATT&CK ─────────────────────────────────────────────────────────────
mitre_attack:
  tactics:
    - "TA0006"    # Credential Access
    - "TA0004"    # Privilege Escalation
  techniques:
    - "T1098"     # Account Manipulation
    - "T1134.001" # Access Token Manipulation: Token Impersonation/Theft

# ── DATA SOURCES ─────────────────────────────────────────────────────────────
data_sources:
  - "SecurityEvent — Windows Security Event Log (Event IDs 4723, 4724)"
  - "Requires audit policy: Audit User Account Management = Success and Failure"

# ── KQL QUERY ────────────────────────────────────────────────────────────────
# NOTE: TargetDomainName == Computer fails when Computer is an FQDN
# (HOST.domain.com) while TargetDomainName is NetBIOS (HOST).
# toupper(split(Computer, ".")[0]) extracts the hostname portion for
# accurate local account matching. Validate against your environment.
query: |
  SecurityEvent
  | where TimeGenerated > ago(2h)
  | where EventID in (4723, 4724)
  | where TargetUserName has_any ("admin", "administrator")
  | where TargetDomainName =~ toupper(tostring(split(Computer, ".")[0]))
  | project TimeGenerated, Computer, EventID, TargetUserName,
      TargetDomainName, SubjectUserName
  | summarize
      ChangeCount      = count(),
      EventIDs         = make_list(EventID),
      SubjectAccounts  = make_set(SubjectUserName),
      FirstEvent       = min(TimeGenerated),
      LastEvent        = max(TimeGenerated)
      by TargetUserName, Computer, TargetDomainName
  | where ChangeCount >= 2
  | extend WindowSeconds = datetime_diff('second', LastEvent, FirstEvent)
  | where WindowSeconds < 120
  | project Computer, TargetUserName, TargetDomainName,
      ChangeCount, EventIDs, SubjectAccounts,
      FirstEvent, LastEvent, WindowSeconds

# ── SCHEDULE ─────────────────────────────────────────────────────────────────
query_frequency: "PT5M"
query_period:    "PT2H"

# ── TRIGGER ──────────────────────────────────────────────────────────────────
trigger_operator:  "GreaterThan"
trigger_threshold: 0

# ── SUPPRESSION ──────────────────────────────────────────────────────────────
suppression_enabled:  false
suppression_duration: "PT1H"

# ── INCIDENT CONFIGURATION ───────────────────────────────────────────────────
incident:
  create: true
  grouping:
    enabled:           true
    reopen_closed:     false
    lookback_duration: "PT2H"
    matching_method:   "AllEntities"
    group_by_entities: []

# ── ENTITY MAPPINGS ──────────────────────────────────────────────────────────
entity_mappings:
  - entity_type: "Account"
    field_mappings:
      - identifier: "Name"
        column:     "TargetUserName"
      - identifier: "NTDomain"
        column:     "TargetDomainName"
  - entity_type: "Host"
    field_mappings:
      - identifier: "HostName"
        column:     "Computer"

# ── CUSTOM DETAILS ────────────────────────────────────────────────────────────
custom_details:
  "Change Count":    "ChangeCount"
  "Window Seconds":  "WindowSeconds"
  "Event IDs":       "EventIDs"
  "Subject Account": "SubjectAccounts"
  "First Event":     "FirstEvent"
  "Last Event":      "LastEvent"

# ── EVENT GROUPING ────────────────────────────────────────────────────────────
event_grouping: "SingleAlert"

# ── FALSE POSITIVE GUIDANCE ───────────────────────────────────────────────────
false_positive_guidance: |
  Expected FP rate is very low. Two password changes on the same local
  administrator account within 120 seconds has no known legitimate operational
  explanation. Possible exceptions:

  - Automated LAPS rotation scripts that reset and immediately re-rotate on
    error — verify LAPS logs and rotation schedule. If confirmed, the LAPS
    service account will appear in SubjectAccounts; add a filter on the known
    LAPS account.
  - Helpdesk automation resetting a password twice within 120 seconds — verify
    with the SubjectAccount user before escalating.
  - IT admin manually resetting a password twice due to a typo — low likelihood,
    verify before closing.

  Any hit from an unknown or unexpected SubjectAccount should be treated as a
  true positive. Escalate immediately.

# ── RESPONSE GUIDANCE ─────────────────────────────────────────────────────────
response_guidance: |
  This alert is Critical severity. Treat as active privilege escalation.
  1. Identify the host and targeted account from alert entities.
  2. Check SubjectAccounts — who initiated the password change? Is it a known
     admin, LAPS service account, or an unexpected account?
  3. Pull the 30-minute process timeline on the affected host in Advanced Hunting:
     DeviceProcessEvents | where DeviceName == "<host>"
     | where Timestamp > ago(30m) | order by Timestamp asc
  4. Look for the following in the same window on the same host:
     - Event ID 4697 (service installed) — BlueHammer transient service
     - cldapi.dll image load events — BlueHammer Cloud Files API indicator
     - cmd.exe or powershell.exe running as NT AUTHORITY\SYSTEM from services.exe
  5. If any of the above are present: isolate the host via MDE immediately
     and escalate to Tier 2 / IR. Assume full local credential compromise.
  6. If SubjectAccount is a known LAPS account and no other indicators are
     present: verify against LAPS logs and close as FP with documentation.

# ── THREAT SCENARIO ───────────────────────────────────────────────────────────
threat_scenario:
  applicable: true
  attack_chain: "VSS Recon (T1082) -> RstrtMgr Oplock (T1068) -> Cloud Files Defender Freeze (T1562.001) -> RPC+Junction SAM Redirect (T1574.005) -> SAM+Boot Key Extraction (T1003.002/T1552.002) -> samlib+SamiChangePasswordUser (T1098) -> Admin Auth+Token Duplication (T1134.001) -> GUID Service SYSTEM Shell (T1543.003/T1569.002)"
  preceding_technique:
    mitre_id:     "T1098"
    description:  "samlib.dll loaded and SamiChangePasswordUser called with recovered NTLM hash to reset local admin password."
    detection_id: "win_security_samlib_load_non_lsass_process"
  following_technique:
    mitre_id:     "T1543.003"
    description:  "Attacker creates GUID-named transient service using duplicated SYSTEM token to spawn SYSTEM shell in user session."
    detection_id: "win_security_guid_named_transient_service_creation"
  coverage_assessment: "Covers Step 7 of 8 in the BlueHammer chain. The most behaviorally unique indicator — two password changes on the same local admin within 120 seconds has no legitimate operational explanation."

